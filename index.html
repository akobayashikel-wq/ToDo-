<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ ToDo アプリ</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
        <div>
            <h1>To Do</h1>
            <ul class="sidebar-menu">
                <li id="menuAll" class="active">すべてのタスク</li>
                <li id="menuActive">今日やる事</li>
                <li id="menuCompleted">完了したタスク</li>
            </ul>
        </div>
        <div style="font-size: 12px; color: #64748b;">Version 1.0.0</div>
    </div>

    <div class="main-content">
        <div class="input-container">
            <input type="text" id="todo-input" placeholder="新しいタスクを入力...">
        </div>

       <div class="todo-wrapper">
            <ul id="todo-list"></ul>
            <button id="clear-completed-btn" class="clear-btn" onclick="clearCompletedTodos()">全削除</button>
        </div> </div></div>
        <script src="script.js"></script>
</body>
</html>
